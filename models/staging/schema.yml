version: 2

models:
  - name: stg_orders
    description: "Staged orders from raw seed data"
    config:
      elementary:
        timestamp_column: "order_date"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: amount
        tests:
          - not_null
          - elementary.column_anomalies:
              column_anomalies:
                - null_count
                - zero_count
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'cancelled']
    tests:
      - elementary.volume_anomalies:
          sensitivity: 3

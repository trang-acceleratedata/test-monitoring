dbt_fab_spark:
  outputs:
    ephemeral_dev:
      authentication: vdstudio_oauth
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: "{{ env_var('WORKSPACE_ID') }}"
      workspace_name: "`{{ env_var('WORKSPACE_NAME') }}`"
      lakehouse: "`{{ env_var('LAKEHOUSE') }}`"
      lakehouseid: "{{ env_var('LAKEHOUSE_ID') }}"
      lakehouse_schemas_enabled: true
      schema: "{{ env_var('SCHEMA') }}"
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: "{{ env_var('DBT_JOB_NAME') }}"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

    ephemeral_dep:
      authentication: fabric_notebook
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: "{{ env_var('WORKSPACE_ID') }}"
      workspace_name: "`{{ env_var('WORKSPACE_NAME') }}`"
      lakehouse: "`{{ env_var('LAKEHOUSE') }}`"
      lakehouseid: "{{ env_var('LAKEHOUSE_ID') }}"
      lakehouse_schemas_enabled: true
      schema: "{{ env_var('SCHEMA') }}"
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: "{{ env_var('DBT_JOB_NAME') }}"
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

    prod:
      authentication: fabric_notebook
      endpoint: https://msitapi.fabric.microsoft.com/v1
      workspaceid: 'e8d68e63-2a03-47c9-ba7b-27ff316b001b'
      workspace_name: '`sampledata`'
      lakehouse: '`salesforce`'
      lakehouseid: 'fd8a5cce-a23c-4173-b092-8c34b10f84e0'
      lakehouse_schemas_enabled: true
      schema: 'dbo'
      method: livy
      type: fabricspark
      reuse_livy_session: true
      session_id_file: ./.livy-session-id.txt
      spark_config:
        name: dbt_spark_job
        driverCores: 4
        driverMemory: 28g
        executorCores: 4
        executorMemory: 28g
      connect_retries: 2
      connect_timeout: 500
      threads: 10

  target: ephemeral_dev
